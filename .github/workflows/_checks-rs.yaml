name: Reusable Rust Checks

on:
  workflow_call:
    inputs:
      enable_linting:
        description: "Enable linting checks with clippy"
        required: false
        type: boolean
        default: true
      enable_tests:
        description: "Enable tests execution"
        required: false
        type: boolean
        default: true
      enable_coverage:
        description: "Enable test coverage reporting"
        required: false
        type: boolean
        default: true
      coverage_threshold:
        description: "Minimum coverage percentage required"
        required: false
        type: number
        default: 75
      coverage_artifact_suffix:
        description: "Suffix to append to coverage artifact name for uniqueness (e.g., 'linux', 'macos')"
        required: false
        type: string
        default: ""
      coverage_regression_tolerance:
        description: "Max allowed coverage drop vs baseline in percentage points (0 to disable). Only applies on PRs."
        required: false
        type: number
        default: 0
      coverage_diff_threshold:
        description: "Minimum coverage percentage for changed files (0 to disable). Only applies on PRs."
        required: false
        type: number
        default: 0
      runner_preset:
        description: "Runner preset (linux-amd64, macos-arm64). Ignored when runs_on is set."
        required: false
        type: string
        default: "linux-amd64"
      runs_on:
        description: "Runner label (e.g. 'ubuntu-latest', 'zondax-runners'). Overridden by runner_preset for macos-arm64."
        required: false
        type: string
        default: "zondax-runners"
      base_image:
        description: "Docker image to use (zondax/ubuntu-ci includes node, bun, pnpm, rust)"
        required: false
        type: string
        default: "zondax/ubuntu-ci:22.04"
      package_path:
        description: "Path to the Rust package relative to the repository root"
        required: false
        type: string
        default: "."
      test_args:
        description: "Additional arguments to pass to cargo test"
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: "Timeout in minutes for the job"
        type: number
        default: 10
      checkout_submodules:
        description: "Checkout submodules"
        required: false
        type: boolean
        default: true
      github_app_auth:
        description: "Use GitHub App Token"
        required: false
        type: boolean
        default: false
      github_app_repos:
        description: "Additional repositories to access (one per line)"
        required: false
        type: string
        default: ""
      post_pr_comment:
        description: "Post coverage results as PR comment"
        required: false
        type: boolean
        default: true
      enable_security_audit:
        description: "Enable security audit with cargo audit"
        required: false
        type: boolean
        default: true
      enable_build:
        description: "Enable build step"
        required: false
        type: boolean
        default: true
      cache_cargo:
        description: "Enable Cargo caching"
        required: false
        type: boolean
        default: true
      enable_node:
        description: "Enable Node.js package manager support"
        required: false
        type: boolean
        default: false
      test_command:
        description: "Test command to run"
        required: false
        type: string
        default: "cargo test --all-features"
      lint_command:
        description: "Lint command to run"
        required: false
        type: string
        default: "cargo clippy --all-targets --all-features -- -D warnings"
      format_command:
        description: "Format check command to run"
        required: false
        type: string
        default: "cargo fmt --all -- --check"
      coverage_command:
        description: "Coverage command to run"
        required: false
        type: string
        default: "cargo tarpaulin --all-features --out Json --output-dir ."
      build_command:
        description: "Build command to run"
        required: false
        type: string
        default: "cargo build --all-targets --all-features"
      audit_command:
        description: "Security audit command to run"
        required: false
        type: string
        default: "cargo audit"
      system_deps_command:
        description: "Command to install system dependencies"
        required: false
        type: string
        default: ""
      environment:
        description: "Environment name to use for accessing environment variables"
        type: string
        default: ""
      autoinit_env:
        description: "Automatically run env:init:ci script after installing dependencies"
        type: boolean
        default: false
      env_init_command:
        description: "Command to initialize environment (without package manager prefix)"
        type: string
        default: "env:init:ci"
      use_rust_cache:
        description: "Enable Rust compilation caching via kache"
        type: boolean
        default: false
      cache_bucket:
        description: "S3-compatible bucket name for caching (e.g., Cloudflare R2)"
        type: string
        default: ""
      cache_endpoint:
        description: "S3-compatible endpoint URL for caching"
        type: string
        default: ""
      cache_region:
        description: "S3 region for caching"
        type: string
        default: "auto"
      enable_integration_tests:
        description: "Enable integration tests (TypeScript client vs Rust server)"
        type: boolean
        default: false
      integration_test_command:
        description: "Integration test command to run (requires enable_node: true)"
        type: string
        default: "pnpm test:integration"
      integration_build_command:
        description: "Command to build test binaries before integration tests"
        type: string
        default: ""
    secrets:
      app_id:
        description: "GitHub App ID"
        required: false
      app_pem:
        description: "GitHub App PEM"
        required: false
      cache_access_key_id:
        description: "AWS/S3 access key ID for cache backend"
        required: false
      cache_secret_access_key:
        description: "AWS/S3 secret access key for cache backend"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  checks-rust:
    runs-on: ${{ fromJSON(inputs.runner_preset == 'macos-arm64' && '["self-hosted", "macOS", "ARM64"]' || format('["{0}"]', inputs.runs_on)) }}
    container: ${{ inputs.runner_preset != 'macos-arm64' && inputs.base_image || '' }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    environment: ${{ inputs.environment }}
    env:
      # S3 credentials for runs-on/cache steps (Cargo registry, pnpm store)
      AWS_ACCESS_KEY_ID: ${{ inputs.cache_bucket != '' && secrets.cache_access_key_id || '' }}
      AWS_SECRET_ACCESS_KEY: ${{ inputs.cache_bucket != '' && secrets.cache_secret_access_key || '' }}
    defaults:
      run:
        working-directory: ${{ inputs.package_path }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      coverage_percentage: ${{ steps.coverage-check.outputs.coverage_percentage }}
      coverage_status: ${{ steps.coverage-check.outputs.coverage_status }}
      coverage_message: ${{ steps.coverage-check.outputs.coverage_message }}
      regression_status: ${{ steps.regression-check.outputs.status }}
      regression_message: ${{ steps.regression-check.outputs.message }}
      diff_coverage_pct: ${{ steps.diff-coverage.outputs.percentage }}
      diff_coverage_status: ${{ steps.diff-coverage.outputs.status }}
      
    steps:
      - name: Setup Ubuntu packages
        # Skip when using zondax/ubuntu-ci (packages pre-installed, but sudo available if needed)
        if: inputs.runner_preset != 'macos-arm64' && !startsWith(inputs.base_image, 'zondax/ubuntu-ci')
        uses: zondax/actions/setup-ubuntu-packages@v1
        with:
          packages: |
            - git
            - curl
            - build-essential
            - pkg-config
            - libssl-dev
      
      - name: Checkout with GitHub App
        uses: zondax/actions/checkout-with-app@v1
        with:
          github_app_auth: ${{ inputs.github_app_auth }}
          github_app_repos: ${{ inputs.github_app_repos }}
          checkout_submodules: ${{ inputs.checkout_submodules }}
          ref: ${{ github.event.pull_request.head.sha }}
          app_id: ${{ secrets.app_id }}
          app_pem: ${{ secrets.app_pem }}

      - name: Check for cache control in PR title
        id: cache-control
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qiE '\[no[_-]?cache\]|\[cache[_-]?off\]'; then
            echo "Cache disabled via PR title"
            echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate with GCP
        if: ${{ inputs.autoinit_env && inputs.environment != '' }}
        uses: zondax/actions/gcp-wif-auth@v1
        with:
          workload_identity_provider: ${{ vars.PULUMI_FRONTEND_WIF_PROVIDER }}
          project_id: ${{ vars.PULUMI_GCP_PROJECT_ID }}

      - name: Cache Cargo registry
        if: inputs.cache_bucket != '' && steps.cache-control.outputs.enabled != 'false'
        uses: runs-on/cache@v4
        env:
          RUNS_ON_S3_BUCKET_CACHE: ${{ inputs.cache_bucket }}
          RUNS_ON_S3_FORCE_PATH_STYLE: "true"
          AWS_ACCESS_KEY_ID: ${{ secrets.cache_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.cache_secret_access_key }}
          AWS_ENDPOINT_URL: ${{ inputs.cache_endpoint }}
          AWS_REGION: ${{ inputs.cache_region }}
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-cargo-main
            ${{ runner.os }}-cargo-dev
            ${{ runner.os }}-cargo-

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: false
          cache_save: false
          working_directory: ${{ inputs.package_path }}

      - name: Run ci_postinstall
        working-directory: ${{ inputs.package_path }}
        run: |
          if mise tasks --no-header 2>/dev/null | grep -q "^ci_postinstall"; then
            mise run ci_postinstall
          fi

      - name: Detect package manager
        id: pm
        working-directory: ${{ inputs.package_path }}
        run: |
          if mise tasks --no-header 2>/dev/null | grep -q "^ci_detect_pm"; then
            echo "$(mise run ci_detect_pm)" >> $GITHUB_OUTPUT
          else
            # Default detection
            if [ -f "bun.lockb" ] || [ -f "bun.lock" ]; then
              echo "pm=bun" >> $GITHUB_OUTPUT
            elif [ -f "pnpm-lock.yaml" ]; then
              echo "pm=pnpm run" >> $GITHUB_OUTPUT
            elif [ -f "yarn.lock" ]; then
              echo "pm=yarn run" >> $GITHUB_OUTPUT
            elif [ -f "package-lock.json" ]; then
              echo "pm=npm run" >> $GITHUB_OUTPUT
            else
              echo "Error: Could not detect package manager. No lock file found (bun.lockb, bun.lock, pnpm-lock.yaml, yarn.lock, or package-lock.json)."
              echo "Either add a lock file or define a 'ci_detect_pm' mise task to specify the package manager."
              exit 1
            fi
          fi

      - name: Initialize environment
        if: ${{ inputs.autoinit_env }}
        working-directory: ${{ inputs.package_path }}
        run: ${{ steps.pm.outputs.pm }} ${{ inputs.env_init_command }}

      - name: Setup kache
        if: inputs.use_rust_cache
        uses: kunobi-ninja/kache-action@v1
        with:
          s3-bucket: ${{ inputs.cache_bucket }}
          s3-endpoint: ${{ inputs.cache_endpoint }}
          s3-region: ${{ inputs.cache_region }}
          s3-access-key-id: ${{ secrets.cache_access_key_id }}
          s3-secret-access-key: ${{ secrets.cache_secret_access_key }}

      - name: Setup Rust cache
        if: inputs.cache_cargo && !inputs.use_rust_cache && steps.cache-control.outputs.enabled != 'false'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.package_path }}
          cache-on-failure: true

      - name: Install cargo-tarpaulin for coverage
        if: inputs.enable_coverage
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Install cargo-audit for security
        if: inputs.enable_security_audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Install cargo-deny for security
        if: inputs.enable_security_audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Install system dependencies
        if: inputs.system_deps_command != ''
        run: ${{ inputs.system_deps_command }}

      - name: Check formatting
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
        run: ${{ inputs.format_command }}

      - name: Run clippy
        if: inputs.enable_linting
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
          RUSTFLAGS: "-D warnings"
        run: ${{ inputs.lint_command }}

      - name: Run tests
        if: inputs.enable_tests && !inputs.enable_coverage
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
        run: ${{ inputs.test_command }} ${{ inputs.test_args }}

      - name: Run tests with coverage
        if: inputs.enable_tests && inputs.enable_coverage
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
        run: ${{ inputs.coverage_command }} ${{ inputs.test_args }}

      - name: Build integration test binaries
        if: inputs.enable_integration_tests && inputs.integration_build_command != ''
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
        run: ${{ inputs.integration_build_command }}

      - name: Run integration tests
        if: inputs.enable_integration_tests
        run: ${{ inputs.integration_test_command }}

      - name: Build
        if: inputs.enable_build
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
        run: ${{ inputs.build_command }}

      - name: Security audit with cargo-audit
        if: inputs.enable_security_audit
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
        run: ${{ inputs.audit_command }}

      - name: Security audit with cargo-deny
        if: inputs.enable_security_audit
        env:
          CARGO_INCREMENTAL: ${{ inputs.use_rust_cache && '0' || '' }}
        run: cargo deny check

      - name: Quality Gate - Test coverage shall be above threshold
        if: inputs.enable_coverage
        id: coverage-check
        shell: bash
        env:
          TESTCOVERAGE_THRESHOLD: ${{ inputs.coverage_threshold }}
        run: |
          echo "🔍 Quality Gate: Test Coverage Check"
          echo "Threshold: $TESTCOVERAGE_THRESHOLD%"
          echo "----------------------------------------"

          # Check if coverage file exists
          if [ ! -f "tarpaulin-report.json" ]; then
            echo "❌ Coverage file not found: tarpaulin-report.json"
            echo "coverage_status=error" >> $GITHUB_OUTPUT
            echo "coverage_message=Coverage file not found: tarpaulin-report.json" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Extract coverage percentage from JSON using jq
          coverage_percent=$(jq -r '.coverage' tarpaulin-report.json 2>/dev/null)
          if [ -z "$coverage_percent" ] || [ "$coverage_percent" = "null" ]; then
            echo "❌ Could not extract coverage from tarpaulin-report.json"
            echo "coverage_status=error" >> $GITHUB_OUTPUT
            echo "coverage_message=Could not extract coverage from tarpaulin-report.json" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Format to 2 decimal places
          coverage_percent=$(awk -v cov="$coverage_percent" 'BEGIN {printf "%.2f", cov}')
          echo "Current coverage: ${coverage_percent}%"
          echo "coverage_percentage=$coverage_percent" >> $GITHUB_OUTPUT

          # Validate coverage is a number using bash regex
          if ! [[ "$coverage_percent" =~ ^[0-9]+\.?[0-9]*$ ]]; then
            echo "❌ Invalid coverage value: $coverage_percent"
            echo "coverage_status=error" >> $GITHUB_OUTPUT
            echo "coverage_message=Invalid coverage value: $coverage_percent" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Compare using awk for reliable float comparison
          result=$(awk -v cov="$coverage_percent" -v thresh="$TESTCOVERAGE_THRESHOLD" 'BEGIN {print (cov >= thresh)}')

          if [ "$result" = "1" ]; then
            echo "✅ Coverage check PASSED (${coverage_percent}% >= ${TESTCOVERAGE_THRESHOLD}%)"
            echo "coverage_status=passed" >> $GITHUB_OUTPUT
            echo "coverage_message=Coverage check PASSED (${coverage_percent}% >= ${TESTCOVERAGE_THRESHOLD}%)" >> $GITHUB_OUTPUT
          else
            echo "❌ Coverage check FAILED (${coverage_percent}% < ${TESTCOVERAGE_THRESHOLD}%)"
            echo ""
            echo "💡 To fix this:"
            echo "   • Add more unit tests to increase coverage"
            echo "   • Focus on untested critical paths"
            echo "   • Or adjust threshold if current coverage is acceptable"
            echo "coverage_status=failed" >> $GITHUB_OUTPUT
            echo "coverage_message=Coverage check FAILED (${coverage_percent}% < ${TESTCOVERAGE_THRESHOLD}%)" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload coverage report as artifact
        if: inputs.enable_coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-rust-${{ github.run_number }}${{ inputs.coverage_artifact_suffix != '' && format('-{0}', inputs.coverage_artifact_suffix) || '' }}
          path: ${{ inputs.package_path }}/tarpaulin-report.json
          retention-days: 15

      - name: Save coverage baseline
        if: ${{ github.event_name == 'push' && inputs.enable_coverage && (inputs.coverage_regression_tolerance > 0 || inputs.coverage_diff_threshold > 0) }}
        shell: bash
        run: |
          mkdir -p coverage-baseline
          cp tarpaulin-report.json coverage-baseline/ 2>/dev/null || true
          echo "Saved Rust coverage baseline for branch ${{ github.ref_name }}"

      - name: Cache coverage baseline
        if: ${{ github.event_name == 'push' && inputs.enable_coverage && (inputs.coverage_regression_tolerance > 0 || inputs.coverage_diff_threshold > 0) }}
        uses: actions/cache/save@v4
        with:
          key: coverage-baseline-${{ github.ref_name }}-rs-${{ inputs.coverage_artifact_suffix }}-${{ github.sha }}
          path: coverage-baseline/

      - name: Restore coverage baseline
        if: ${{ github.event_name == 'pull_request' && inputs.enable_coverage && (inputs.coverage_regression_tolerance > 0 || inputs.coverage_diff_threshold > 0) }}
        id: baseline-cache
        uses: actions/cache/restore@v4
        with:
          key: coverage-baseline-${{ github.base_ref }}-rs-${{ inputs.coverage_artifact_suffix }}-no-exact-match
          restore-keys: |
            coverage-baseline-${{ github.base_ref }}-rs-${{ inputs.coverage_artifact_suffix }}-
          path: coverage-baseline/

      - name: Coverage regression check
        if: ${{ github.event_name == 'pull_request' && inputs.enable_coverage && inputs.coverage_regression_tolerance > 0 }}
        id: regression-check
        shell: bash
        env:
          TOLERANCE: ${{ inputs.coverage_regression_tolerance }}
        run: |
          echo "Rust Coverage Regression Check (tolerance: ${TOLERANCE}%)"
          echo "----------------------------------------"

          if [ ! -f "coverage-baseline/tarpaulin-report.json" ]; then
            echo "No baseline found — skipping regression check"
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "message=No baseline found" >> $GITHUB_OUTPUT
            exit 0
          fi

          current=$(jq -r '.coverage' tarpaulin-report.json 2>/dev/null)
          baseline=$(jq -r '.coverage' coverage-baseline/tarpaulin-report.json 2>/dev/null)

          if [ -z "$current" ] || [ "$current" = "null" ] || [ -z "$baseline" ] || [ "$baseline" = "null" ]; then
            echo "Could not extract coverage values"
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "message=Could not extract coverage values" >> $GITHUB_OUTPUT
            exit 0
          fi

          current=$(awk -v c="$current" 'BEGIN {printf "%.2f", c}')
          baseline=$(awk -v b="$baseline" 'BEGIN {printf "%.2f", b}')
          delta=$(awk "BEGIN {printf \"%.2f\", $current - $baseline}")
          drop=$(awk "BEGIN {printf \"%.2f\", $baseline - $current}")

          echo "Baseline: ${baseline}% -> Current: ${current}% (delta: ${delta}%)"

          if awk "BEGIN {exit !($drop > $TOLERANCE)}"; then
            echo "Coverage dropped ${drop}% (exceeds ${TOLERANCE}% tolerance)"
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "message=Coverage dropped from ${baseline}% to ${current}% (${delta}%, exceeds -${TOLERANCE}% tolerance)" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "No regression (${delta}%)"
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "message=No regression: ${baseline}% -> ${current}% (${delta}%)" >> $GITHUB_OUTPUT
          fi

      - name: Diff coverage check
        if: ${{ github.event_name == 'pull_request' && inputs.enable_coverage && inputs.coverage_diff_threshold > 0 }}
        id: diff-coverage
        shell: bash
        env:
          THRESHOLD: ${{ inputs.coverage_diff_threshold }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Rust Diff Coverage Check (threshold: ${THRESHOLD}%)"
          echo "----------------------------------------"

          if [ ! -f "tarpaulin-report.json" ]; then
            echo "tarpaulin-report.json not found — skipping"
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "percentage=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get changed Rust files from the GitHub API (reliable with shallow clones).
          # Uses curl instead of gh CLI since the job may run inside a Docker container.
          # NOTE: fetches up to 100 files per page (GitHub API max). PRs with >100
          # changed files will only analyse the first 100; this covers the vast
          # majority of PRs in practice.
          pr_json=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100")
          changed_files=$(echo "$pr_json" | jq -r '.[].filename' | grep -E '\.rs$' | grep -v '_test\.rs$\|/tests/\|/test_' || true)

          if [ -z "$changed_files" ]; then
            echo "No coverable Rust source files changed"
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "percentage=100" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "$changed_files" | while read f; do echo "  - $f"; done

          # Extract added/modified line numbers from a unified diff patch.
          # Only lines starting with '+' (excluding the hunk header) are counted.
          get_added_lines() {
            local patch="$1"
            if [ -z "$patch" ]; then return; fi
            echo "$patch" | awk '
              /^@@/ { split($3, parts, ","); sub(/^\+/, "", parts[1]); new_line = parts[1] + 0; next }
              /^\\/ { next }
              /^\+/ { print new_line; new_line++; next }
              /^-/  { next }
              { new_line++ }
            '
          }

          # GITHUB_WORKSPACE points to the repo checkout root regardless of
          # working-directory. GitHub API returns repo-relative filenames, so we
          # need the repo root to build the absolute paths tarpaulin records.
          repo_root="${GITHUB_WORKSPACE}"

          total_coverable=0
          total_covered=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            abs_path="${repo_root}/${file}"

            # Extract the patch (unified diff) for this file from the API response
            file_patch=$(echo "$pr_json" | jq -r --arg f "$file" '.[] | select(.filename == $f) | .patch // empty')
            added_lines=$(get_added_lines "$file_patch")

            if [ -z "$added_lines" ]; then
              echo "  ${file}: no added lines — skipped"
              continue
            fi

            line_count=$(echo "$added_lines" | wc -l | tr -d ' ')

            # Convert added lines to a JSON array for jq consumption
            added_json=$(echo "$added_lines" | jq -R 'tonumber' | jq -s '.')

            # Tarpaulin stores paths as arrays of components: ["/", "dir", "file.rs"]
            # Reconstruct full path: root element + join rest with "/"
            file_data=$(jq --arg p "$abs_path" '.files[] | select((.path | .[0] + (.[1:] | join("/"))) == $p)' tarpaulin-report.json 2>/dev/null)

            if [ -z "$file_data" ] || [ "$file_data" = "null" ]; then
              continue
            fi

            # Only count traces whose line is in the set of added lines
            read file_coverable file_covered <<< $(echo "$file_data" | jq --argjson lines "$added_json" '
              [.traces[] | select(.line as $l | $lines | any(. == $l))] |
              "\(length) \([.[] | select(.stats.Line > 0)] | length)"
            ' -r)

            if [ "$file_coverable" -gt 0 ] 2>/dev/null; then
              total_coverable=$((total_coverable + file_coverable))
              total_covered=$((total_covered + file_covered))
              file_pct=$(awk "BEGIN {printf \"%.1f\", ($file_covered/$file_coverable)*100}")
              echo "  ${file}: ${file_covered}/${file_coverable} (${file_pct}%) [${line_count} lines changed]"
            fi
          done <<< "$changed_files"

          if [ "$total_coverable" -eq 0 ]; then
            echo "No coverable lines in changed files"
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "percentage=100" >> $GITHUB_OUTPUT
            exit 0
          fi

          diff_pct=$(awk "BEGIN {printf \"%.1f\", ($total_covered/$total_coverable)*100}")
          echo ""
          echo "Diff coverage: ${total_covered}/${total_coverable} (${diff_pct}%)"
          echo "percentage=${diff_pct}" >> $GITHUB_OUTPUT

          if awk "BEGIN {exit !($diff_pct >= $THRESHOLD)}"; then
            echo "Diff coverage passed (${diff_pct}% >= ${THRESHOLD}%)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "Diff coverage failed (${diff_pct}% < ${THRESHOLD}%)"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Fail workflow if coverage check failed
        if: inputs.enable_coverage && steps.coverage-check.outputs.coverage_status == 'failed'
        run: |
          echo "❌ Workflow failed due to insufficient test coverage"
          echo "Coverage: ${{ steps.coverage-check.outputs.coverage_percentage }}%"
          echo "Required: ${{ inputs.coverage_threshold }}%"
          exit 1


  post-coverage-comment:
    needs: checks-rust
    if: inputs.enable_coverage && inputs.post_pr_comment && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && always() && needs.checks-rust.outputs.coverage_status != ''
    uses: zondax/_workflows/.github/workflows/_post-pr-comment-reusable.yml@v5
    secrets: inherit
    with:
      issue_number: ${{ github.event.number }}
      comment_identifier: "rust-coverage-report"
      comment_body: |
        ## ${{ (needs.checks-rust.outputs.coverage_status == 'passed' && needs.checks-rust.outputs.regression_status != 'failed' && needs.checks-rust.outputs.diff_coverage_status != 'failed') && '✅' || '❌' }} Rust Test Coverage Report

        | Metric | Value |
        |--------|-------|
        | **Current Coverage** | ${{ needs.checks-rust.outputs.coverage_percentage }}% |
        | **Required Threshold** | ${{ inputs.coverage_threshold }}% |
        | **Threshold Status** | **${{ needs.checks-rust.outputs.coverage_status == 'passed' && 'PASSED' || needs.checks-rust.outputs.coverage_status == 'failed' && 'FAILED' || 'ERROR' }}** |

        ${{ needs.checks-rust.outputs.regression_status == 'failed' && format('**❌ Regression:** {0}', needs.checks-rust.outputs.regression_message) || needs.checks-rust.outputs.regression_status == 'passed' && format('**✅ Regression:** {0}', needs.checks-rust.outputs.regression_message) || needs.checks-rust.outputs.regression_status == 'skipped' && '**⚠️ Regression:** No baseline available yet' || '' }}

        ${{ needs.checks-rust.outputs.diff_coverage_status == 'failed' && format('**❌ Diff coverage:** {0}% (required: {1}%)', needs.checks-rust.outputs.diff_coverage_pct, inputs.coverage_diff_threshold) || needs.checks-rust.outputs.diff_coverage_status == 'passed' && format('**✅ Diff coverage:** {0}%', needs.checks-rust.outputs.diff_coverage_pct) || '' }}

        ---