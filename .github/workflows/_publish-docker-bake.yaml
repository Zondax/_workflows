name: Reusable Publish Docker (Bake)

on:
  workflow_call:
    inputs:
      # REGISTRY
      registry:
        description: "Target registry: 'dockerhub', 'gcp-ar', or 'both'"
        type: string
        default: "dockerhub"

      # BAKE CONFIGURATION
      bake_file:
        description: "Path to docker-bake.hcl"
        type: string
        default: "docker-bake.hcl"
      bake_targets:
        description: "Comma-separated targets (empty = default group)"
        type: string
        default: ""
      workdir:
        description: "Working directory"
        type: string
        default: "."

      # MULTI-ARCHITECTURE
      platforms:
        description: "Target platforms"
        type: string
        default: "linux/amd64"
      enable_multiarch:
        description: "Enable QEMU for cross-platform builds"
        type: boolean
        default: false

      # DEPRECATED REMOTE BUILDER INPUTS
      enable_remote_builder:
        description: "Deprecated: ignored. This workflow now uses a local DinD-backed Buildx builder."
        type: boolean
        default: false
      remote_builder_url:
        description: "Deprecated: ignored."
        type: string
        default: "tcp://buildkit.zondax.dev:8372"
      remote_builder_name:
        description: "Deprecated: ignored."
        type: string
        default: "zondax-builder"

      # SECURITY
      enable_signing:
        description: "Sign images with Cosign (keyless OIDC)"
        type: boolean
        default: true
      enable_provenance:
        description: "Generate SLSA provenance"
        type: boolean
        default: true
      enable_sbom:
        description: "Generate SBOM"
        type: boolean
        default: false

      # STANDARD
      runner:
        description: "Runner to use for the workflow"
        type: string
        default: "zondax-runners"
      timeout_minutes:
        description: "Timeout in minutes for the job"
        type: number
        default: 30
      environment:
        description: "GitHub environment for accessing secrets/vars"
        type: string
        default: ""
      checkout_ref:
        description: "The ref to checkout (branch, tag, SHA)"
        type: string
        default: ""
      github_app_auth:
        description: "Use GitHub App Token for private repos"
        type: boolean
        default: false
      github_app_repos:
        description: "Additional repositories to access (one per line)"
        type: string
        default: ""

    secrets:
      DOCKERHUB_USER:
        description: "Docker Hub username"
        required: false
      DOCKERHUB_TOKEN:
        description: "Docker Hub access token"
        required: false
      app_id:
        description: "GitHub App ID"
        required: false
      app_pem:
        description: "GitHub App PEM"
        required: false

    outputs:
      image_tags:
        description: "All generated tags (newline-separated)"
        value: ${{ jobs.publish.outputs.image_tags }}
      image_digest:
        description: "Primary image digest"
        value: ${{ jobs.publish.outputs.image_digest }}
      bake_metadata:
        description: "Full bake output JSON"
        value: ${{ jobs.publish.outputs.bake_metadata }}

jobs:
  publish:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    environment: ${{ inputs.environment }}
    env:
      DOCKER_HOST: tcp://127.0.0.1:2375
      DOCKER_TLS_CERTDIR: ""
    permissions:
      contents: read
      packages: write
      pull-requests: write # For PR comments
      id-token: write # For OIDC (Cosign, GCP WIF)
    services:
      docker:
        image: docker:28-dind
        env:
          DOCKER_TLS_CERTDIR: ""
        options: >-
          --privileged
          --health-cmd "docker info >/dev/null 2>&1 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 2375:2375

    outputs:
      image_tags: ${{ steps.tags.outputs.tags_file }}
      image_digest: ${{ steps.bake.outputs.digest }}
      bake_metadata: ${{ steps.bake.outputs.metadata }}

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -yy git jq

      - name: Checkout with GitHub App
        uses: zondax/actions/checkout-with-app@v1
        with:
          github_app_auth: ${{ inputs.github_app_auth }}
          github_app_repos: ${{ inputs.github_app_repos }}
          fetch_depth: 0
          ref: ${{ inputs.checkout_ref || github.event.pull_request.head.ref || github.ref }}
          app_id: ${{ secrets.app_id }}
          app_pem: ${{ secrets.app_pem }}
          use_sudo: true

      - name: Set up QEMU
        if: inputs.enable_multiarch
        uses: docker/setup-qemu-action@v4

      - name: Warn on deprecated remote builder inputs
        if: ${{ inputs.enable_remote_builder || inputs.remote_builder_url != 'tcp://buildkit.zondax.dev:8372' || inputs.remote_builder_name != 'zondax-builder' }}
        run: |
          echo "::warning::Remote builder inputs are deprecated and ignored. This workflow now uses a local DinD-backed Buildx builder."

      - name: Verify Docker daemon
        run: |
          docker version
          docker info

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Login to Docker Hub
        if: contains(inputs.registry, 'dockerhub') || inputs.registry == 'both'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate with GCP
        if: contains(inputs.registry, 'gcp') || inputs.registry == 'both'
        uses: zondax/actions/gcp-wif-auth@v1
        with:
          workload_identity_provider: ${{ vars.PULUMI_DEPLOY_WIF_PROVIDER }}
          setup_gcloud: true

      - name: Configure Docker for GCP AR
        if: contains(inputs.registry, 'gcp') || inputs.registry == 'both'
        run: gcloud auth configure-docker ${{ vars.PULUMI_GAR_LOCATION }}-docker.pkg.dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Generate Docker Tags
        id: tags
        working-directory: ${{ inputs.workdir }}
        run: |
          # Generate tags using zondax CLI
          # Filter out info lines (ℹ) that go to stdout, keep only HCL content
          npx -y @zondax/cli@latest ci tags \
            -f "${{ inputs.bake_file }}" \
            2>/dev/null | grep -v '^ℹ' > tags-override.hcl

          echo "Generated tags:"
          cat tags-override.hcl

          echo "tags_file=tags-override.hcl" >> $GITHUB_OUTPUT

      - name: Derive version from git ref
        id: version
        run: |
          REF="${GITHUB_REF:-}"
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/}"        # v0.7.59
            VER="${TAG#v}"                 # 0.7.59
          else
            TAG="dev"
            VER="0.0.0"
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VER"   >> $GITHUB_OUTPUT
          echo "Derived VERSION=$VER  IMAGE_TAG=$TAG  (from $REF)"

      - name: Resolve Bake Plan
        id: plan
        shell: bash
        working-directory: ${{ inputs.workdir }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
        run: |
          set -euo pipefail

          declare -a requested_targets=()
          if [ -n "${{ inputs.bake_targets }}" ]; then
            while IFS= read -r target; do
              [ -n "$target" ] || continue
              requested_targets+=("$target")
            done < <(printf '%s' "${{ inputs.bake_targets }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')
          fi

          bake_args=(
            docker buildx bake
            -f "${{ inputs.bake_file }}"
            -f "${{ steps.tags.outputs.tags_file }}"
            --print
          )

          if [ "${#requested_targets[@]}" -gt 0 ]; then
            bake_args+=("${requested_targets[@]}")
          fi

          "${bake_args[@]}" > bake-plan.json

          if [ "${#requested_targets[@]}" -gt 0 ]; then
            printf '%s\n' "${requested_targets[@]}" > bake-targets.txt
          else
            jq -r '.group.default.targets[]? // empty' bake-plan.json > bake-targets.txt
            if [ ! -s bake-targets.txt ]; then
              jq -r '.target | keys[]' bake-plan.json > bake-targets.txt
            fi
          fi

          echo "Resolved bake targets:"
          cat bake-targets.txt

          echo "plan_file=bake-plan.json" >> $GITHUB_OUTPUT
          echo "targets_file=bake-targets.txt" >> $GITHUB_OUTPUT

      - name: Build and Push
        id: bake
        shell: bash
        working-directory: ${{ inputs.workdir }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
          USE_REGISTRY_CACHE: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
        run: |
          set -euo pipefail

          plan_file="${{ steps.plan.outputs.plan_file }}"
          targets_file="${{ steps.plan.outputs.targets_file }}"
          metadata_file="bake-metadata.json"
          echo '{}' > "$metadata_file"

          while IFS= read -r target; do
            [ -n "$target" ] || continue

            echo "::group::Build and push ${target}"

            metadata_target_file="bake-${target}.json"
            bake_args=(
              docker buildx bake
              --progress=plain
              --metadata-file "$metadata_target_file"
              -f "${{ inputs.bake_file }}"
              -f "${{ steps.tags.outputs.tags_file }}"
              "$target"
              --set "*.platform=${{ inputs.platforms }}"
              --set "*.output=type=registry,compression=zstd,compression-level=3"
            )

            if [ "${USE_REGISTRY_CACHE}" != "true" ]; then
              bake_args+=(
                --set "*.cache-from="
                --set "*.cache-to="
              )
            fi

            if [ "${{ inputs.enable_provenance }}" = "true" ]; then
              bake_args+=(--provenance=mode=min)
            else
              bake_args+=(--provenance=false)
            fi

            if [ "${{ inputs.enable_sbom }}" = "true" ]; then
              bake_args+=(--sbom=true)
            else
              bake_args+=(--sbom=false)
            fi

            "${bake_args[@]}"

            primary_tag=$(jq -r --arg target "$target" '.target[$target].tags[0]' "$plan_file")
            image_names=$(jq -r --arg target "$target" '.target[$target].tags | join(",")' "$plan_file")
            digest=$(docker buildx imagetools inspect "$primary_tag" --format '{{json .Manifest}}' | jq -r '.digest')

            tmp_metadata="$(mktemp)"
            jq \
              --arg target "$target" \
              --arg image_names "$image_names" \
              --arg digest "$digest" \
              '. + {
                ($target): {
                  "image.name": $image_names,
                  "containerimage.digest": $digest,
                  "digest": $digest
                }
              }' \
              "$metadata_file" > "$tmp_metadata"
            mv "$tmp_metadata" "$metadata_file"

            echo "::endgroup::"
          done < "$targets_file"

          primary_target="$(head -n1 "$targets_file")"
          primary_digest="$(jq -r --arg target "$primary_target" '.[$target].digest // empty' "$metadata_file")"

          {
            echo "metadata<<EOF"
            cat "$metadata_file"
            echo "EOF"
            echo "digest=${primary_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: inputs.enable_signing
        uses: sigstore/cosign-installer@v3

      - name: Sign images
        if: inputs.enable_signing
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          echo "$METADATA" | jq -c 'to_entries[]' | while read -r entry; do
            IMAGE_REF=$(echo "$entry" | jq -r '.value."image.name"' | tr ',' '\n' | head -1)
            DIGEST=$(echo "$entry" | jq -r '.value."containerimage.digest" // .value.digest // empty')

            if [ -n "$IMAGE_REF" ] && [ -n "$DIGEST" ] && [ "$DIGEST" != "null" ]; then
              FULL_REF="${IMAGE_REF}@${DIGEST}"
              echo "Signing: $FULL_REF"
              cosign sign --yes "$FULL_REF"
            fi
          done

      - name: Build Summary
        id: summary
        working-directory: ${{ inputs.workdir }}
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'

          # Build image list
          IMAGE_LIST=""

          for target in $(echo "$METADATA" | jq -r 'keys[]'); do
            # Get the first tag (primary tag like zondax/ubuntu-ci:22.04)
            IMAGE_REF=$(echo "$METADATA" | jq -r ".[\"$target\"].\"image.name\"" | tr ',' '\n' | head -1)
            DIGEST=$(echo "$METADATA" | jq -r ".[\"$target\"].\"containerimage.digest\"")

            if [ -n "$DIGEST" ] && [ "$DIGEST" != "null" ] && [ -n "$IMAGE_REF" ]; then
              FULL_REF="${IMAGE_REF}@${DIGEST}"
              SHORT_NAME="${IMAGE_REF%%:*}"

              # Query registry for manifest (we're already authenticated from the push)
              MANIFEST=$(docker buildx imagetools inspect "$FULL_REF" --raw 2>/dev/null || echo "{}")

              # Check if multi-platform manifest list or index
              if echo "$MANIFEST" | jq -e '.manifests' > /dev/null 2>&1; then
                FIRST_DIGEST=$(echo "$MANIFEST" | jq -r '.manifests[0].digest')
                PLATFORM=$(echo "$MANIFEST" | jq -r '.manifests[0].platform | "\(.os)/\(.architecture)"')
                LAYER_MANIFEST=$(docker buildx imagetools inspect "${SHORT_NAME}@${FIRST_DIGEST}" --raw 2>/dev/null || echo "{}")
              else
                LAYER_MANIFEST="$MANIFEST"
                PLATFORM="${{ inputs.platforms }}"
              fi

              # Get all tags for this target
              ALL_TAGS=$(echo "$METADATA" | jq -r ".[\"$target\"].\"image.name\"" | tr ',' '\n' | sed 's/^/- /')

              # Calculate total compressed size and layer details in one jq call
              read -r IMAGE_SIZE_MB LAYER_COUNT <<< $(echo "$LAYER_MANIFEST" | jq -r '
                [(.layers // [])[].size] |
                [(add // 0) / 1048576 | . * 100 | floor / 100, length] |
                @tsv' 2>/dev/null || echo "0 0")

              # Build layer breakdown (in order) with hash
              LAYER_DETAILS=$(echo "$LAYER_MANIFEST" | jq -r '
                (.layers // []) | to_entries | .[] |
                "L\(.key)  \(.value.digest | split(":")[1][0:12])  \(.value.size / 1048576 | . * 100 | floor / 100) MB"' 2>/dev/null || echo "")

              IMAGE_LIST="${IMAGE_LIST}
          **\`${IMAGE_REF}\`** (${PLATFORM})
          \`\`\`
          ${LAYER_DETAILS}
          Total: ${IMAGE_SIZE_MB} MB
          \`\`\`
          Tags:
          ${ALL_TAGS}
          "
            fi
          done

          # Generate summary content
          SUMMARY="## 🐳 Docker Build Summary

          ### Published Images
          ${IMAGE_LIST}
          ### Build Configuration
          - **Builder:** Docker-in-Docker (local Buildx)
          - **Platforms:** \`${{ inputs.platforms }}\`
          - **Compression:** zstd
          - **Signed:** ${{ inputs.enable_signing && 'Yes' || 'No' }} | **SBOM:** ${{ inputs.enable_sbom && 'Yes' || 'No' }} | **Provenance:** ${{ inputs.enable_provenance && 'Yes' || 'No' }}"

          # Write to job summary
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

          # Save for PR comment
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "comment_body<<$EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ${{ steps.summary.outputs.comment_body }}

            ---
            <sub>Build triggered by commit ${{ github.sha }}</sub>
          reactions: rocket
